<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Form</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Times New Roman', Times, serif;
    background: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 460px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  .card-header {
    background: #111;
    padding: 1.4rem 2rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .card-header h2 {
    font-size: 1.2rem;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.05em;
  }

  .card-header p {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .card-body { padding: 1.8rem 2rem 2rem; }

  .section-title {
    font-size: 0.7rem;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #111;
    margin-bottom: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid #ddd;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: bold;
    color: #333;
    margin-bottom: 0.3rem;
    letter-spacing: 0.04em;
  }

  .field input[type="text"],
  .field input[type="date"] {
    width: 100%;
    padding: 0.55rem 0.75rem;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.92rem;
    border: 1.5px solid #aaa;
    border-radius: 8px;
    background: #f7f7f7;
    color: #111;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input[type="text"]:focus,
  .field input[type="date"]:focus {
    border-color: #111;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    background: #fff;
  }

  .divider { border: none; border-top: 1.5px solid #ddd; margin: 1.4rem 0; }

  .radio-row {
    display: flex;
    gap: 1rem;
    margin-top: 0.3rem;
  }

  .radio-pill {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.45rem 1rem;
    border: 1.5px solid #aaa;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.88rem;
    color: #333;
    transition: border-color 0.15s, background 0.15s;
    background: #f7f7f7;
  }

  .radio-pill input[type="radio"] { accent-color: #111; }

  .radio-pill:has(input:checked) {
    border-color: #111;
    background: #e8e8e8;
    color: #111;
    font-weight: bold;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.6rem;
    margin-top: 0.3rem;
  }

  .subject-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.7rem;
    border: 1.5px solid #aaa;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #333;
    background: #f7f7f7;
    transition: border-color 0.15s, background 0.15s;
  }

  .subject-chip input[type="checkbox"] { accent-color: #111; }

  .subject-chip:has(input:checked) {
    border-color: #111;
    background: #e8e8e8;
    color: #111;
    font-weight: bold;
  }

  .hint {
    font-size: 0.7rem;
    color: #888;
    margin-top: 0.4rem;
  }

  .submit-btn {
    width: 100%;
    padding: 0.8rem;
    margin-top: 1.6rem;
    background: #111;
    color: #fff;
    font-family: 'Times New Roman', Times, serif;
    font-size: 1rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .submit-btn:hover { background: #333; }
  .submit-btn:active { transform: scale(0.99); }

  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border: 1px solid #ccc; border-radius: 0; }
    .card-header { background: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .submit-btn { display: none; }
  }
</style>

<script>
  function validateForm() {
    const subjects = document.querySelectorAll('input[name="subjects"]:checked');
    if (subjects.length !== 3) {
      alert("Please select exactly 3 subjects.");
      return false;
    }
    return true;
  }
</script>
</head>

<body>
<div class="card">

  <div class="card-header">
    <div class="header-icon">🎓</div>
    <div>
      <h2>Student Registration</h2>
      <p>Fill in your details below</p>
    </div>
  </div>

  <div class="card-body">
    <form action="StudentServlet" method="post" onsubmit="return validateForm()">

      <div class="section-title">Personal Info</div>

      <div class="grid-2">
        <div class="field">
          <label for="prn">PRN Number</label>
          <input type="text" id="prn" name="prn" placeholder="e.g. 2023001" required>
        </div>
        <div class="field">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required>
        </div>
      </div>

      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>

      <div class="field">
        <label>Gender</label>
        <div class="radio-row">
          <label class="radio-pill">
            <input type="radio" name="gender" value="Male" required> Male
          </label>
          <label class="radio-pill">
            <input type="radio" name="gender" value="Female"> Female
          </label>
        </div>
      </div>

      <hr class="divider">

      <div class="section-title">Subjects</div>

      <div class="subjects-grid">
        <label class="subject-chip"><input type="checkbox" name="subjects" value="Java"> Java</label>
        <label class="subject-chip"><input type="checkbox" name="subjects" value="Python"> Python</label>
        <label class="subject-chip"><input type="checkbox" name="subjects" value="C"> C</label>
        <label class="subject-chip"><input type="checkbox" name="subjects" value="C++"> C++</label>
        <label class="subject-chip"><input type="checkbox" name="subjects" value="DBMS"> DBMS</label>
        <label class="subject-chip"><input type="checkbox" name="subjects" value="OS"> OS</label>
      </div>
      <p class="hint">&#9432; Select exactly 3 subjects</p>

      <button type="submit" class="submit-btn">Submit Registration</button>

    </form>
  </div>
</div>
</body>
</html>
